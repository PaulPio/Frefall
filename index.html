<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#04050d" />
  <title>FREEFALL</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #04050d;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }
    #app { height: 100%; }
    canvas { display: block; }

    /* ---- phone controller page ---- */
    body.controller { touch-action: none; }
    .ctl {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #d6f6ff;
      text-align: center;
      padding: 4vh 6vw;
      box-sizing: border-box;
      background: radial-gradient(ellipse at 50% 0%, #0a1130 0%, #04050d 70%);
    }
    .ctl h1 {
      margin: 0;
      font-size: 9vw;
      letter-spacing: 0.35em;
      color: #4df3ff;
      text-shadow: 0 0 18px #4df3ff88;
      font-weight: 900;
    }
    .ctl .code {
      margin-top: 1vh;
      font-size: 4vw;
      letter-spacing: 0.3em;
      color: #7f8db8;
    }
    .ctl .status {
      margin-top: 3vh;
      font-size: 4.5vw;
      min-height: 6vw;
      color: #ffd24d;
    }
    .ctl .status.ok { color: #6dff9e; }
    .ctl .status.bad { color: #ff5d7a; }
    .ctl .tiltwrap {
      margin-top: 4vh;
      width: 80vw;
      height: 5vw;
      border: 1px solid #2a3560;
      border-radius: 99px;
      position: relative;
      overflow: hidden;
    }
    .ctl .tiltdot {
      position: absolute;
      top: 0;
      left: 50%;
      width: 12vw;
      height: 100%;
      margin-left: -6vw;
      border-radius: 99px;
      background: #4df3ff;
      box-shadow: 0 0 14px #4df3ffaa;
      transition: none;
    }
    .ctl .hint {
      margin-top: 2.5vh;
      font-size: 3.6vw;
      color: #7f8db8;
      line-height: 1.5;
    }
    .ctl button {
      margin-top: auto;
      margin-bottom: 2vh;
      width: 88vw;
      padding: 7vh 0;
      font-size: 7vw;
      font-weight: 900;
      letter-spacing: 0.2em;
      color: #04050d;
      background: linear-gradient(180deg, #4df3ff, #2fb8ff);
      border: none;
      border-radius: 24px;
      box-shadow: 0 0 30px #4df3ff55;
      touch-action: manipulation;
    }
    .ctl button:active { transform: scale(0.97); filter: brightness(1.15); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
